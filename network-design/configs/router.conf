! 出口路由器配置 (Cisco IOS)
! 功能: NAT、ACL访问控制、连接外网

hostname Edge-Router

! ===== 内网接口（连接核心交换机）=====
interface GigabitEthernet0/0
 description Link-to-Core-Switch
 ip address 10.0.0.2 255.255.255.252
 ip nat inside
 no shutdown

! ===== 外网接口（连接ISP）=====
interface GigabitEthernet0/1
 description Link-to-ISP
 ip address 203.0.113.1 255.255.255.0    ! 公网IP（示例）
 ip nat outside
 no shutdown

! ===== 到内网的路由 =====
ip route 192.168.10.0 255.255.255.0 10.0.0.1
ip route 192.168.20.0 255.255.255.0 10.0.0.1
ip route 192.168.30.0 255.255.255.0 10.0.0.1
ip route 192.168.40.0 255.255.255.0 10.0.0.1
ip route 192.168.50.0 255.255.255.0 10.0.0.1
ip route 192.168.60.0 255.255.255.0 10.0.0.1

! ===== 默认路由（指向ISP）=====
ip route 0.0.0.0 0.0.0.0 203.0.113.254

! ===== NAT配置（PAT - 端口地址转换）=====
! 定义内网地址范围
access-list 10 permit 192.168.10.0 0.0.0.255
access-list 10 permit 192.168.20.0 0.0.0.255
access-list 10 permit 192.168.30.0 0.0.0.255
access-list 10 permit 192.168.40.0 0.0.0.255
access-list 10 permit 192.168.50.0 0.0.0.255
access-list 10 permit 192.168.60.0 0.0.0.255

! 启用PAT
ip nat inside source list 10 interface GigabitEthernet0/1 overload

! ===== 静态NAT映射（服务器对外发布）=====
! WWW服务器
ip nat inside source static tcp 192.168.50.3 80 203.0.113.1 80
! FTP服务器
ip nat inside source static tcp 192.168.50.4 21 203.0.113.1 21
! FTP数据端口
ip nat inside source static tcp 192.168.50.4 20 203.0.113.1 20
! MAIL服务器(SMTP)
ip nat inside source static tcp 192.168.50.5 25 203.0.113.1 25
! MAIL服务器(POP3)
ip nat inside source static tcp 192.168.50.5 110 203.0.113.1 110

! ===== ACL访问控制 =====
! 扩展ACL: 允许内网访问外网，拒绝外网主动访问内网
! 允许已建立的连接返回（仅在外网入方向）
access-list 101 permit tcp any any established
access-list 101 permit icmp any any echo-reply
! 允许外网访问Web服务器
access-list 101 permit tcp any host 203.0.113.1 eq 80
! 允许外网访问FTP服务器
access-list 101 permit tcp any host 203.0.113.1 eq 21
access-list 101 permit tcp any host 203.0.113.1 eq 20
! 允许外网访问MAIL服务器
access-list 101 permit tcp any host 203.0.113.1 eq 25
access-list 101 permit tcp any host 203.0.113.1 eq 110
! 拒绝其他所有外网发起的连接
access-list 101 deny ip any any

! 在外网接口入方向应用ACL
interface GigabitEthernet0/1
 ip access-group 101 in

! ===== 安全配置 =====
line vty 0 4
 password cisco123
 login
enable secret cisco123
service password-encryption
