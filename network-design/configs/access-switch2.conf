! 汇聚层交换机2配置 (Cisco IOS)
! 连接图书馆(30)、学生宿舍(40)、服务器区(50)、管理区(60)

hostname Access-Switch2

! ===== 创建VLAN =====
vlan 30
 name Tushuguan
vlan 40
 name Sushe
vlan 50
 name Server
vlan 60
 name Guanli

! ===== 上行Trunk接口（连接核心交换机）=====
interface GigabitEthernet0/1
 description Uplink-to-Core-Switch
 switchport mode trunk

! ===== Access接口 =====
interface range FastEthernet0/1 - 6
 description PC-Tushuguan
 switchport mode access
 switchport access vlan 30
 spanning-tree portfast

interface range FastEthernet0/7 - 14
 description PC-Sushe
 switchport mode access
 switchport access vlan 40
 spanning-tree portfast

interface range FastEthernet0/15 - 18
 description Server-Farm
 switchport mode access
 switchport access vlan 50
 spanning-tree portfast

interface range FastEthernet0/19 - 24
 description PC-Guanli
 switchport mode access
 switchport access vlan 60
 spanning-tree portfast

! ===== 管理IP =====
interface vlan 1
 ip address 192.168.1.12 255.255.255.0
 no shutdown

! ===== 安全配置 =====
line vty 0 4
 password cisco123
 login
enable secret cisco123
service password-encryption
