! 核心三层交换机配置 (Cisco IOS)
! 功能: VLAN间路由、DHCP服务器、Trunk链路

hostname Core-Switch

! ===== 启用路由功能 =====
ip routing

! ===== 创建VLAN =====
vlan 10
 name Jiaoxue
vlan 20
 name Bangong
vlan 30
 name Tushuguan
vlan 40
 name Sushe
vlan 50
 name Server
vlan 60
 name Guanli

! ===== SVI接口配置（各VLAN网关）=====
interface vlan 10
 ip address 192.168.10.1 255.255.255.0
 no shutdown

interface vlan 20
 ip address 192.168.20.1 255.255.255.0
 no shutdown

interface vlan 30
 ip address 192.168.30.1 255.255.255.0
 no shutdown

interface vlan 40
 ip address 192.168.40.1 255.255.255.0
 no shutdown

interface vlan 50
 ip address 192.168.50.1 255.255.255.0
 no shutdown

interface vlan 60
 ip address 192.168.60.1 255.255.255.0
 no shutdown

! ===== Trunk接口（连接汇聚层交换机）=====
interface GigabitEthernet0/1
 description Link-to-Access-Switch1
 switchport trunk encapsulation dot1q
 switchport mode trunk

interface GigabitEthernet0/2
 description Link-to-Access-Switch2
 switchport trunk encapsulation dot1q
 switchport mode trunk

! ===== 连接路由器的接口（三层接口）=====
interface GigabitEthernet0/24
 description Link-to-Router
 no switchport
 ip address 10.0.0.1 255.255.255.252
 no shutdown

! ===== 默认路由（指向出口路由器）=====
ip route 0.0.0.0 0.0.0.0 10.0.0.2

! ===== DHCP配置 =====
ip dhcp excluded-address 192.168.10.1 192.168.10.10
ip dhcp excluded-address 192.168.20.1 192.168.20.10
ip dhcp excluded-address 192.168.30.1 192.168.30.10
ip dhcp excluded-address 192.168.40.1 192.168.40.10
ip dhcp excluded-address 192.168.50.1 192.168.50.5   ! 排除服务器静态IP
ip dhcp excluded-address 192.168.60.1 192.168.60.10

ip dhcp pool VLAN10_Jiaoxue
 network 192.168.10.0 255.255.255.0
 default-router 192.168.10.1
 dns-server 192.168.50.2

ip dhcp pool VLAN20_Bangong
 network 192.168.20.0 255.255.255.0
 default-router 192.168.20.1
 dns-server 192.168.50.2

ip dhcp pool VLAN30_Tushuguan
 network 192.168.30.0 255.255.255.0
 default-router 192.168.30.1
 dns-server 192.168.50.2

ip dhcp pool VLAN40_Sushe
 network 192.168.40.0 255.255.255.0
 default-router 192.168.40.1
 dns-server 192.168.50.2

ip dhcp pool VLAN50_Server
 network 192.168.50.0 255.255.255.0
 default-router 192.168.50.1

ip dhcp pool VLAN60_Guanli
 network 192.168.60.0 255.255.255.0
 default-router 192.168.60.1
 dns-server 192.168.50.2

! ===== 安全配置 =====
line vty 0 4
 password cisco123
 login
enable secret cisco123
service password-encryption
